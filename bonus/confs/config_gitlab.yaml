global:
  hosts:
    domain: local
    https: false
  ingress:
    configureCertmanager: false
    class: traefik
nginx-ingress:
  enabled: false
prometheus:
  install: false
gitlab-runner:
  install: false
minio:
  ingress:
    enabled: false

gitlab:
  webservice:
    resources:
      requests:
        memory: 512Mi
    minReplicas: 1
    maxReplicas: 1
  sidekiq:
    minReplicas: 1
    maxReplicas: 1
  gitlab-shell:
    minReplicas: 1
    maxReplicas: 1