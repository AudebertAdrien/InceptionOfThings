apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: app-test
  namespace: argocd
spec:
  project: default
  source:
    repoURL: http://root:glpat-VagrantToken1234@gitlab.local:8181/root/iot-project.git
    targetRevision: main
    path: apps
  destination:
    server: https://kubernetes.default.svc
    namespace: dev
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true
